- hosts: all
  gather_facts: true
  become: true

  vars:
    dockerhub_username: "{{ vault_dockerhub_username }}"
    postgres_db: "{{ vault_postgres_db }}"
    postgres_user: "{{ vault_postgres_user }}"
    postgres_password: "{{ vault_postgres_password }}"

  roles:
    - docker
    - network
    - database
    - backend
    - front
    - proxy
