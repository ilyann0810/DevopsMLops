services:
  database:
    build: ./database
    container_name: my-database
    restart: unless-stopped
    networks:
      - backend-db
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: my-backend
    restart: unless-stopped
    networks:
      - backend-db
      - frontend-backend
    depends_on:
      database:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://my-database:5432/${POSTGRES_DB}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  httpd:
    build: ./httpd
    container_name: my-httpd
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - frontend-backend
    depends_on:
      backend:
        condition: service_healthy

networks:
  backend-db:
  frontend-backend:

volumes:
  db-data:
